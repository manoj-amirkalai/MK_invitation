<!-- SEO and Social Media Meta Tags for Wedding Invitation -->
<!-- Copy and paste all tags below into your <head> section in index.html -->

<!-- Standard HTML Meta Tags -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description"
    content="You are cordially invited to celebrate the wedding of [Couple Name]. Join us for an unforgettable day filled with love, joy, and cherished moments.">
<meta name="keywords" content="wedding invitation, wedding ceremony, celebration, marriage, special day">
<meta name="theme-color" content="#FFD700">
<meta name="robots" content="index, follow">
<meta name="author" content="[Couple Name]">

<!-- Open Graph Tags (for Facebook, LinkedIn, WhatsApp) -->
<meta property="og:type" content="website">
<meta property="og:title" content="[Couple Name] - Wedding Invitation">
<meta property="og:description"
    content="Join us as we celebrate our special day. We would be honored by your presence at our wedding ceremony.">
<meta property="og:image" content="./src/assets/gallery/image (11).png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:type" content="image/jpeg">
<meta property="og:url" content="https://manojkeerthana-invitation.onrender.com">
<meta property="og:site_name" content="Wedding Invitation">

<!-- Twitter Card Tags -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="[Couple Name] - Wedding Invitation">
<meta name="twitter:description"
    content="Join us as we celebrate our special day. We would be honored by your presence at our wedding ceremony.">
<meta name="twitter:image" content="./src/assets/gallery/image (11).png">
<meta name="twitter:image:alt" content="[Couple Name] Wedding Invitation">
<meta name="twitter:creator" content="@[twitter_handle]">

<!-- Additional Meta Tags for Better Social Sharing -->
<meta property="og:locale" content="en_US">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<!-- Page Title -->
<title>[Couple Name] - Wedding Invitation</title>

IMAGE SPECIFICATIONS:
